<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 7h-3a2 2 0 0 1-2-2V2"/>
          <path d="M9 18a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h7l4 4v12a2 2 0 0 1-2 2Z"/>
          <path d="M3 7.6v12.8A1.6 1.6 0 0 0 4.6 22h9.8"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">Solicitudes</span>
        <span class="brand-tag">v1.0 · usuario</span>
      </div>
    </div>

    <div class="nav-label">Menú principal</div>
    <nav>
      <a routerLink="tickets" routerLinkActive="active">
        <span class="nav-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </span>
        <span class="nav-text">Mis tickets</span>
        <span class="nav-dot"></span>
      </a>
      <a routerLink="tickets/nuevo" routerLinkActive="active">
        <span class="nav-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </span>
        <span class="nav-text">Nuevo ticket</span>
        <span class="nav-dot"></span>
      </a>
    </nav>

    <div class="user-section">
      <div class="user-card">
        <div class="user-avatar">
          <span>{{ rol?.charAt(0) }}</span>
          <span class="status-dot"></span>
        </div>
        <div class="user-info">
          <div class="user-name">Mi cuenta</div>
          <span class="rol-badge">{{ rol }}</span>
        </div>
      </div>
      <button class="btn-logout" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <main class="contenido">
    <router-outlet></router-outlet>
  </main>
</div>
